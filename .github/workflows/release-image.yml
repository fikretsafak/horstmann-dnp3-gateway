# Build & push container image to GitHub Container Registry (ghcr.io).
#
# Triggers:
#   - main push     -> ghcr.io/<owner>/<repo>:latest + :sha-<short>
#   - tag v*.*.*    -> ghcr.io/<owner>/<repo>:<version> + :latest
#
# Image visibility:
#   The repo is private but the published package can be made PUBLIC from
#   GitHub UI (Profile -> Packages -> horstmann-dnp3-gateway -> Settings ->
#   Change visibility -> Public). After that step, end users can run
#   `docker pull ghcr.io/fikretsafak/horstmann-dnp3-gateway:latest` without
#   `docker login`. Source code stays private.
#
# Why GHCR (not Docker Hub):
#   - Already authenticated via GITHUB_TOKEN (no extra secrets to manage).
#   - Public packages have unlimited anonymous pulls; Docker Hub free tier rate-limits.
#
# Multi-arch:
#   linux/amd64 (typical Ubuntu / Windows Docker Desktop hosts) and
#   linux/arm64 (Raspberry Pi 4/5, Apple Silicon dev). Customer field servers
#   are usually amd64; arm64 covers edge devices without an extra build.

name: build-and-push-image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main push -> :latest + :sha-<short>; tag v0.4.3 -> :0.4.3 + :latest.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # yadnp3 (OpenDNP3 native, ~10dk derleme) prod icin tercih edilir;
          # default DNP3_LIBRARY=dnp3py ile saf python (string DESTEKLENMEZ).
          # Sahada Horstmann SN2 string sinyalleri kullanildigi icin yadnp3 sart.
          build-args: |
            DNP3_LIBRARY=yadnp3
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
